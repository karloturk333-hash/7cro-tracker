name: Update 7CRO data

# Povlaci svjeze podatke sa ZSE i commita ih natrag u repo.
# Streamlit Cloud se onda auto-redeploya.

on:
  schedule:
    # 18:00 UTC = 19:00 CET (radnim danom, nakon zatvaranja burze)
    - cron: "0 18 * * 1-5"
  workflow_dispatch:   # omogucava rucno pokretanje iz GitHub UI-ja

permissions:
  contents: write       # da workflow smije commitati

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Fetch latest ZSE data
        run: python scripts/fetch_zse.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/sample/7cro_zse.csv)" ]; then
            LATEST=$(tail -n +2 data/sample/7cro_zse.csv | cut -d';' -f4 | sort -r | head -1)
            git add data/sample/7cro_zse.csv
            git commit -m "chore: auto-update 7CRO data ($(date +%Y-%m-%d), latest $LATEST)"
            git push
            echo "Pushano. Zadnji datum u CSV-u: $LATEST"
          else
            echo "Nema promjena u podacima."
          fi
